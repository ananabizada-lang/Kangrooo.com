    <style>
        .carousel {
  --img-width: 150;  /* px */
  --img-height: 175; /* px */
  --img-padding: 8;  /* px */

  width: calc(var(--img-width) * 1px);
  height: calc(var(--img-height) * 1px);
  perspective: 1000px;
}

.images {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  animation: rotate 60s linear infinite;
}

@keyframes rotate {
  to { transform: rotateY(-1turn); }
}

.carousel img {
  --angle: calc(sibling-index() * (1turn / sibling-count()));

  --distance: calc(
    ( (var(--img-width) / 2) + var(--img-padding) )
    / tan( ((pi * 2) / sibling-count()) / 2 ) * 1px
  );

  width: calc(var(--img-width) * 1px);
  height: calc(var(--img-height) * 1px);
  border-radius: 0.5em;
  position: absolute;
  object-fit: cover;
  backface-visibility: hidden;
  transform: 
    rotateY(var(--angle))
    translateZ(var(--distance))
   ;
}


/* ============================ */

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  display: grid;
  place-items: center;
  font-family: sans-serif;
  background: black;
  color: white;
}
    </style>
